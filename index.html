<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОНЛАЙН ЧАТ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 400px; border: 2px solid #0f0; padding: 20px; background: #111; box-shadow: 0 0 15px #0f0; }
        input, button { width: 100%; background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; margin: 5px 0; box-sizing: border-box; font-family: monospace; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #0f0; color: #000; }
        #chat-window { display: none; flex-direction: column; height: 500px; }
        #messages { flex-grow: 1; border: 1px solid #0f0; margin-bottom: 10px; overflow-y: auto; padding: 10px; background: #050505; }
        .msg { margin-bottom: 8px; word-wrap: break-word; line-height: 1.2; }
        .msg b { color: #fff; }
        .hidden { display: none; }
        h2 { text-align: center; margin-top: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-screen">
        <h2>ВХОД / РЕГ</h2>
        <input type="text" id="username" placeholder="НИКНЕЙМ">
        <input type="password" id="password" placeholder="ПАРОЛЬ">
        <button onclick="login()">ВОЙТИ</button>
        <button onclick="register()">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="chat-window">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <span id="user-display" style="color:#fff"></span>
            <button onclick="location.reload()" style="width:auto; padding:5px 10px; margin:0;">ВЫХОД</button>
        </div>
        <div id="messages"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Пиши..." style="margin:0;">
            <button onclick="sendMsg()" style="width:80px; margin:0; padding:0;">ОРАТЬ</button>
        </div>
    </div>
</div>

<script>
    // ТВОИ ДАННЫЕ ИЗ ФАЙЛА (ПОЛНЫЕ)
    const S_URL = "https://ndfdrfllvppjymxtuehy.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZmRyZmxsdnBwanlteHR1ZWh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI0MjI4NDMsImV4cCI6MjA1ODAwMjg0M30.4iM-R9_U3D3_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P_9_P"; 
    // Примечание: Ключ вставлен максимально длинный, как в твоем конфиге.

    const sb = supabase.createClient(S_URL, S_KEY);
    let currentUser = null;

    async function login() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return;

        const { data, error } = await sb.from('mb_players').select('*').eq('username', u).eq('password_hash', p).maybeSingle();
        
        if (data) {
            currentUser = data;
            startChat();
        } else {
            alert("ОШИБКА ВХОДА");
        }
    }

    async function register() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return;

        const { error } = await sb.from('mb_players').insert([{ username: u, password_hash: p }]);
        if (!error) alert("ГОТОВО! ТЕПЕРЬ ЖМИ ВОЙТИ");
        else alert("НИК ЗАНЯТ");
    }

    function startChat() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('user-display').innerText = currentUser.username;
        
        // Реалтайм подписка
        sb.channel('chat_main').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mb_chat' }, payload => {
            renderMessage(payload.new);
        }).subscribe();

        loadHistory();
    }

    async function loadHistory() {
        const { data } = await sb.from('mb_chat').select('*').order('created_at', { ascending: false }).limit(50);
        if (data) {
            const box = document.getElementById('messages');
            box.innerHTML = ''; // Чистим перед загрузкой
            data.reverse().forEach(m => renderMessage(m));
        }
    }

    function renderMessage(m) {
        const box = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${m.sender_name}:</b> ${m.message}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('chat-input');
        const text = inp.value.trim();
        if (!text) return;
        
        const { error } = await sb.from('mb_chat').insert([{ sender_name: currentUser.username, message: text }]);
        if(error) console.error(error);
        inp.value = '';
    }

    document.getElementById('chat-input').onkeydown = (e) => { if(e.key === 'Enter') sendMsg(); };
</script>

</body>
</html>
