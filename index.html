<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Хоккей</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; touch-action:none; }
canvas { display:block; }
#screen-menu, #screen-win {
  position:fixed; inset:0;
  background:rgba(5,10,30,0.96);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:200; font-family:Arial,sans-serif;
}
#screen-win { display:none; }
.menu-title { color:#fff; font-size:6vw; font-weight:bold; text-shadow:0 0 20px #4af; margin-bottom:4vw; }
.btn { background:linear-gradient(135deg,#2255cc,#1133aa); color:#fff; border:none; border-radius:3vw; padding:2vw 8vw; font-size:4vw; cursor:pointer; margin:1.5vw; box-shadow:0 0.5vw 3vw rgba(0,100,255,0.5); }
.score-limit-label { color:#aaa; font-size:3.5vw; margin-bottom:2vw; }
.score-limit-btns { display:flex; gap:2vw; margin-bottom:3vw; }
.slim-btn { background:#112; color:#88aaff; border:0.4vw solid #4488ff; border-radius:2vw; padding:1.5vw 4vw; font-size:4vw; cursor:pointer; }
.slim-btn.active { background:#4488ff; color:#fff; }
#win-img { max-width:60vw; max-height:30vh; object-fit:contain; margin-bottom:3vw; }
#win-text { color:#fff; font-size:5vw; font-weight:bold; margin-bottom:3vw; }
</style>
</head>
<body>

<div id="screen-menu">
  <div class="menu-title">🏒 Хоккей — Три кота</div>
  <div class="score-limit-label">Играть до:</div>
  <div class="score-limit-btns">
    <button class="slim-btn active" onclick="setLimit(5,this)">5</button>
    <button class="slim-btn" onclick="setLimit(10,this)">10</button>
    <button class="slim-btn" onclick="setLimit(15,this)">15</button>
    <button class="slim-btn" onclick="setLimit(20,this)">20</button>
  </div>
  <button class="btn" onclick="startGame()">▶ Начать</button>
</div>

<div id="screen-win">
  <img id="win-img" src="" alt="winner">
  <div id="win-text"></div>
  <button class="btn" onclick="restartGame()">🔄 Ещё раз</button>
  <button class="btn" onclick="goMenu()">🏠 Меню</button>
</div>

<canvas id="c"></canvas>

<script>
// Fullscreen + landscape
function goFS(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
}
document.addEventListener('touchstart',goFS,{once:true});
document.addEventListener('click',goFS,{once:true});

const c=document.getElementById('c');
const ctx=c.getContext('2d');
let W,H,sx,sy,dpr=1;
const BW=800,BH=480;

// FIX 5: devicePixelRatio для чёткости
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  dpr=window.devicePixelRatio||1;
  c.width=W*dpr; c.height=H*dpr;
  c.style.width=W+'px'; c.style.height=H+'px';
  sx=W*dpr/BW; sy=H*dpr/BH;
}
window.addEventListener('resize',resize);
resize();

function img(src){const i=new Image();i.src=src;return i;}
const iRink=img('karta.png');
const iRed=img('haha.png');
const iBlue=img('kompot.png');
const iW1=img('winner1.png');
const iW2=img('winner2.png');

let scoreLimit=5;
let sRed=0,sBlue=0;
let running=false;

// FIX 1: RINK откалиброван под реальную карту karta.png
const RINK={x:52,y:30,w:696,h:420};
// Ворота: высота GH, глубина GD, вертикальная позиция LGY
const GH=112, GD=22;
const LGY=BH/2-GH/2; // ~184

const PR=36, PKTR=20; // FIX 4: шайба крупнее
const SPMAX=11;
const FRIC=0.80;

let red={},blue={},puck={};
let redDrag=null,blueDrag=null;

function resetPos(){
  red ={x:200,y:BH/2,vx:0,vy:0,r:PR};
  blue={x:BW-200,y:BH/2,vx:0,vy:0,r:PR};
  // FIX 4: начальная скорость шайбы меньше
  puck={x:BW/2,y:BH/2,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,r:PKTR};
}

function setLimit(n,btn){
  scoreLimit=n;
  document.querySelectorAll('.slim-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function startGame(){
  document.getElementById('screen-menu').style.display='none';
  sRed=0;sBlue=0;redDrag=null;blueDrag=null;
  resetPos();running=true;loop();
}
function restartGame(){
  document.getElementById('screen-win').style.display='none';
  startGame();
}
function goMenu(){
  document.getElementById('screen-win').style.display='none';
  document.getElementById('screen-menu').style.display='flex';
  running=false;
}

// Touch coords → game coords (независимо от dpr)
function tb(cx,cy){return{x:cx*BW/W,y:cy*BH/H};}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// FIX 2: управление — только если зажал СВОЙ кружок, с зональным ограничением
document.addEventListener('touchstart',e=>{
  if(!running)return;
  for(const t of e.changedTouches){
    const p=tb(t.clientX,t.clientY);
    // Красный: касание в левой зоне + попадание в кружок
    if(!redDrag && p.x < BW*0.6 && dst(p,red) < red.r*1.3){
      redDrag={id:t.identifier,px:p.x,py:p.y};
    }
    // Синий: касание в правой зоне + попадание в кружок
    else if(!blueDrag && p.x > BW*0.4 && dst(p,blue) < blue.r*1.3){
      blueDrag={id:t.identifier,px:p.x,py:p.y};
    }
  }
},{passive:true});

document.addEventListener('touchmove',e=>{
  if(!running)return;
  for(const t of e.changedTouches){
    const p=tb(t.clientX,t.clientY);
    if(redDrag&&t.identifier===redDrag.id){
      red.vx+=(p.x-redDrag.px)*0.7;
      red.vy+=(p.y-redDrag.py)*0.7;
      redDrag.px=p.x;redDrag.py=p.y;
    }
    if(blueDrag&&t.identifier===blueDrag.id){
      blue.vx+=(p.x-blueDrag.px)*0.7;
      blue.vy+=(p.y-blueDrag.py)*0.7;
      blueDrag.px=p.x;blueDrag.py=p.y;
    }
  }
},{passive:true});

document.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(redDrag&&t.identifier===redDrag.id)redDrag=null;
    if(blueDrag&&t.identifier===blueDrag.id)blueDrag=null;
  }
},{passive:true});

// Physics
function clamp(pl){
  const s=Math.hypot(pl.vx,pl.vy);
  if(s>SPMAX){pl.vx=pl.vx/s*SPMAX;pl.vy=pl.vy/s*SPMAX;}
}

function movePlayer(pl){
  pl.x+=pl.vx; pl.y+=pl.vy;
  pl.vx*=FRIC; pl.vy*=FRIC;
  if(pl.x-pl.r<RINK.x){pl.x=RINK.x+pl.r;pl.vx*=-0.4;}
  if(pl.x+pl.r>RINK.x+RINK.w){pl.x=RINK.x+RINK.w-pl.r;pl.vx*=-0.4;}
  if(pl.y-pl.r<RINK.y){pl.y=RINK.y+pl.r;pl.vy*=-0.4;}
  if(pl.y+pl.r>RINK.y+RINK.h){pl.y=RINK.y+RINK.h-pl.r;pl.vy*=-0.4;}
}

function collidePP(){
  const dx=blue.x-red.x,dy=blue.y-red.y;
  const d=Math.hypot(dx,dy),mn=red.r+blue.r;
  if(d<mn&&d>0){
    const nx=dx/d,ny=dy/d,ov=(mn-d)/2;
    red.x-=nx*ov;red.y-=ny*ov;
    blue.x+=nx*ov;blue.y+=ny*ov;
    const rel=(red.vx-blue.vx)*nx+(red.vy-blue.vy)*ny;
    if(rel>0){red.vx-=rel*nx;red.vy-=rel*ny;blue.vx+=rel*nx;blue.vy+=rel*ny;}
  }
}

function movePuck(){
  for(const pl of [red,blue]){
    const dx=puck.x-pl.x,dy=puck.y-pl.y;
    const d=Math.hypot(dx,dy),mn=pl.r+puck.r;
    if(d<mn&&d>0){
      const nx=dx/d,ny=dy/d;
      puck.x+=nx*(mn-d);puck.y+=ny*(mn-d);
      const sp=Math.hypot(pl.vx,pl.vy);
      // FIX 4: меньше сила отталкивания
      puck.vx=nx*Math.max(3.5,sp*1.7)+pl.vx*0.3;
      puck.vy=ny*Math.max(3.5,sp*1.7)+pl.vy*0.3;
    }
  }
  puck.x+=puck.vx; puck.y+=puck.vy;
  puck.vx*=0.987; puck.vy*=0.987;

  // Верх/низ стенки
  if(puck.y-puck.r<RINK.y){puck.y=RINK.y+puck.r;puck.vy*=-0.62;}
  if(puck.y+puck.r>RINK.y+RINK.h){puck.y=RINK.y+RINK.h-puck.r;puck.vy*=-0.62;}

  // Левая стенка / ворота
  if(puck.x-puck.r<RINK.x){
    if(puck.y>LGY&&puck.y<LGY+GH){goal('blue');return;}
    puck.x=RINK.x+puck.r;puck.vx*=-0.62;
  }
  // Правая стенка / ворота
  if(puck.x+puck.r>RINK.x+RINK.w){
    if(puck.y>LGY&&puck.y<LGY+GH){goal('red');return;}
    puck.x=RINK.x+RINK.w-puck.r;puck.vx*=-0.62;
  }
}

function goal(who){
  if(who==='red')sRed++;else sBlue++;
  if(sRed>=scoreLimit||sBlue>=scoreLimit){
    running=false;
    const rw=sRed>=scoreLimit;
    document.getElementById('win-img').src=rw?'winner2.png':'winner1.png';
    document.getElementById('win-text').textContent=rw?'🔴 Красные победили!':'🔵 Синие победили!';
    document.getElementById('win-text').style.color=rw?'#ff6666':'#6699ff';
    document.getElementById('screen-win').style.display='flex';
  } else resetPos();
}

// Draw helpers
function clipImg(x,y,r,im){
  ctx.save();
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.drawImage(im,x-r,y-r,r*2,r*2);
  ctx.restore();
}

function star(x,y,r,color){
  ctx.save();ctx.beginPath();
  for(let i=0;i<5;i++){
    const a1=i*4*Math.PI/5-Math.PI/2;
    const a2=i*4*Math.PI/5+2*Math.PI/5-Math.PI/2;
    i===0?ctx.moveTo(x+r*Math.cos(a1),y+r*Math.sin(a1)):ctx.lineTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    ctx.lineTo(x+r*0.4*Math.cos(a2),y+r*0.4*Math.sin(a2));
  }
  ctx.closePath();ctx.fillStyle=color;ctx.fill();ctx.restore();
}

// FIX 3: красные сверху по центру, синие снизу по центру
function drawStars(){
  const sz=14, gap=20;
  const totalW=(scoreLimit-1)*gap;
  const startX=BW/2-totalW/2;

  // Красные — верхний центр
  for(let i=0;i<scoreLimit;i++){
    star(startX+i*gap, 16, sz, i<sRed?'#ff4444':'rgba(255,80,80,0.18)');
  }
  // Синие — нижний центр
  for(let i=0;i<scoreLimit;i++){
    star(startX+i*gap, BH-16, sz, i<sBlue?'#4499ff':'rgba(80,140,255,0.18)');
  }
}

function draw(){
  ctx.save();
  ctx.scale(sx,sy);

  // Поле
  ctx.drawImage(iRink,0,0,BW,BH);

  // Тени игроков
  for(const pl of [red,blue]){
    ctx.beginPath();ctx.ellipse(pl.x,pl.y+10,pl.r*0.85,pl.r*0.3,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fill();
  }

  // Игроки
  clipImg(red.x,red.y,red.r,iRed);
  clipImg(blue.x,blue.y,blue.r,iBlue);

  // Подсветка при захвате
  if(redDrag){
    ctx.beginPath();ctx.arc(red.x,red.y,red.r+7,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,80,80,0.85)';ctx.lineWidth=3.5;ctx.stroke();
  }
  if(blueDrag){
    ctx.beginPath();ctx.arc(blue.x,blue.y,blue.r+7,0,Math.PI*2);
    ctx.strokeStyle='rgba(80,140,255,0.85)';ctx.lineWidth=3.5;ctx.stroke();
  }

  // Шайба — тень
  ctx.beginPath();ctx.ellipse(puck.x,puck.y+7,puck.r*0.85,puck.r*0.32,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fill();
  // Шайба
  ctx.beginPath();ctx.arc(puck.x,puck.y,puck.r,0,Math.PI*2);
  ctx.fillStyle='#111';ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.stroke();

  // Блик на шайбе
  ctx.beginPath();ctx.arc(puck.x-puck.r*0.3,puck.y-puck.r*0.3,puck.r*0.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();

  // Звёздочки счёта
  drawStars();

  ctx.restore();
}

function loop(){
  if(!running)return;
  clamp(red);clamp(blue);
  movePlayer(red);movePlayer(blue);
  collidePP();
  movePuck();
  ctx.clearRect(0,0,c.width,c.height);
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
